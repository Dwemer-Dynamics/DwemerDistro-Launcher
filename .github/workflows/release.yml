name: Release Launcher

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Launcher version (for example 2.5.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore .\DwemerDistroLauncherWpf.sln

      - name: Publish launcher
        run: >
          dotnet publish .\src\DwemerDistro.Launcher.Wpf\DwemerDistro.Launcher.Wpf.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:Version=${{ steps.version.outputs.value }}
          /p:FileVersion=${{ steps.version.outputs.value }}.0
          /p:AssemblyVersion=${{ steps.version.outputs.value }}.0
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o .\artifacts\publish\win-x64

      - name: Install vpk
        run: dotnet tool install --global vpk --version 0.0.1298

      - name: Pack Velopack release
        shell: pwsh
        run: >
          vpk pack
          --packId DwemerDistro
          --packVersion ${{ steps.version.outputs.value }}
          --packDir .\artifacts\publish\win-x64
          --packAuthors "Dwemer Dynamics"
          --packTitle "DwemerDistro"
          --mainExe DwemerDistro.exe
          --icon .\src\DwemerDistro.Launcher.Wpf\Assets\DwemerDistro.ico
          --outputDir .\artifacts\velopack
          --channel win
          --runtime win-x64
          --shortcuts Desktop,StartMenuRoot

      - name: Upload GitHub release assets
        shell: pwsh
        run: >
          vpk upload github
          --outputDir .\artifacts\velopack
          --repoUrl https://github.com/Dwemer-Dynamics/DwemerDistro-Launcher
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --merge
          --releaseName "DwemerDistro ${{ steps.version.outputs.value }}"
          --tag "v${{ steps.version.outputs.value }}"
