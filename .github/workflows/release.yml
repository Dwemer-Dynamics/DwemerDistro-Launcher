name: Release Launcher

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore .\DwemerDistroLauncherWpf.sln

      - name: Publish launcher
        run: >
          dotnet publish .\src\DwemerDistro.Launcher.Wpf\DwemerDistro.Launcher.Wpf.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:Version=${{ steps.version.outputs.value }}
          /p:FileVersion=${{ steps.version.outputs.value }}.0
          /p:AssemblyVersion=${{ steps.version.outputs.value }}.0
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o .\artifacts\publish\launcher

      - name: Publish updater
        run: >
          dotnet publish .\src\DwemerDistro.Updater\DwemerDistro.Updater.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o .\artifacts\publish\updater

      - name: Assemble release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\artifacts\release | Out-Null
          Copy-Item .\artifacts\publish\updater\DwemerDistroUpdater.exe .\artifacts\publish\launcher\DwemerDistroUpdater.exe -Force
          Compress-Archive -Path .\artifacts\publish\launcher\* -DestinationPath .\artifacts\release\DwemerDistro-win-x64.zip -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DwemerDistro ${{ steps.version.outputs.value }}
          files: |
            artifacts/release/DwemerDistro-win-x64.zip
